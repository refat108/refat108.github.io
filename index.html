<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <title>GEOG-585L: My first map </title>
</head>
<body>
    <p> 
        My first map
    </p>
    <div id="map" style="height: 500px; width: 600px"></div>
    <script>    
        //Economics Buidling 35.08617889651901° N, 106.62053610456539° W
        //Create a variable named mymap. Use the L.map function to create the map in the "map" div. Set the view to the coordinates of Bandelier Hall East with a zoom level of 17.
        var mymap = L.map('map').setView([35.08617889651901, -106.62053610456539], 17);
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
        osm.addTo(mymap);
    </script>
</body>
</html>
